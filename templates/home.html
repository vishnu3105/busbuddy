<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BusBuddy - Home</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #0a0a12;
            color: white;
            font-family: 'Segoe UI', sans-serif;
            min-height: 100vh;
            padding: 20px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        .app-name {
            font-size: 24px;
            font-weight: bold;
            color: #00ff88;
        }

        .greeting {
            font-size: 13px;
            color: #555;
        }

        .search-bar {
            width: 100%;
            padding: 14px 16px;
            background: #1a1a2e;
            border: 1px solid #222;
            border-radius: 12px;
            color: white;
            font-size: 15px;
            outline: none;
            margin-bottom: 25px;
        }

        .search-bar:focus {
            border-color: #00ff88;
        }

        .section-title {
            font-size: 14px;
            color: #555;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .bus-card {
            position: relative;
            background: #0f0f1a;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 15px;
            border: 1px solid #1a1a2e;
            overflow: hidden;
            transition: border 0.3s;
        }

        .bus-card:hover {
            border-color: #00ff88;
        }

        .bus-card-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .bus-number {
            font-size: 22px;
            font-weight: bold;
        }

        .crowd-badge {
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: bold;
        }

        .empty { background: #0a2a1a; color: #00ff88; }
        .moderate { background: #2a1a00; color: #ffaa00; }
        .crowded { background: #2a0a0a; color: #ff4444; }

        .route {
            font-size: 14px;
            color: #888;
            margin-bottom: 12px;
        }

        .meter {
            width: 100%;
            height: 6px;
            background: #1a1a2e;
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 12px;
        }

        .meter-fill {
            height: 100%;
            border-radius: 10px;
            transition: width 0.5s ease, background 0.5s ease;
        }

        .bus-card-bottom {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .suggestion {
            font-size: 13px;
            color: #aaa;
        }

        .eta {
            font-size: 13px;
            color: #555;
        }

        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #0f0f1a;
            border-top: 1px solid #1a1a2e;
            display: flex;
            justify-content: space-around;
            padding: 15px 0;
        }

        .nav-item {
            text-align: center;
            font-size: 11px;
            color: #555;
            cursor: pointer;
        }

        .nav-item.active {
            color: #00ff88;
        }

        .nav-icon {
            font-size: 22px;
            margin-bottom: 4px;
        }

        .content {
            padding-bottom: 80px;
        }
    </style>
</head>
<body>
    <div class="header">
        <div>
            <div class="app-name">🚌 BusBuddy</div>
            <div class="greeting">Good morning, Vishnu 👋</div>
        </div>
        <div style="font-size: 24px;">🔔</div>
    </div>

    <input class="search-bar" type="text" placeholder="🔍 Search route or bus stop...">

    <div class="content">
        <div class="section-title">Nearby Buses</div>

        <!-- Bus Card 1 - Live ML Data -->
        <div class="bus-card">
            <div class="bus-card-top">
                <div class="bus-number">Bus 66</div>
                <div class="crowd-badge empty" id="badge">Loading...</div>
            </div>
            <div class="route">🛣️ Tambaram → poonamalle</div>
            <div class="meter">
                <div class="meter-fill" id="meter"></div>
            </div>
            <div class="bus-card-bottom">
                <div class="suggestion" id="suggestion">Fetching data...</div>
                <div class="eta">🕐 ETA 3 mins</div>
            </div>
        </div>

        <!-- Bus Card 2 - Static for demo -->
        <div class="bus-card">
            <div class="bus-card-top">
                <div class="bus-number">Bus 45G</div>
                <div class="crowd-badge crowded">🔴 Crowded</div>
            </div>
            <div class="route">🛣️ Tambaram → T.Nagar</div>
            <div class="meter">
                <div class="meter-fill" style="width: 85%; background: #ff4444;"></div>
            </div>
            <div class="bus-card-bottom">
                <div class="suggestion">❌ Wait for next bus</div>
                <div class="eta">🕐 ETA 7 mins</div>
            </div>
        </div>

        <!-- Bus Card 3 - Static for demo -->
        <div class="bus-card">
            <div class="bus-card-top">
                <div class="bus-number">Bus 12B</div>
                <div class="crowd-badge moderate">🟡 Moderate</div>
            </div>
            <div class="route">🛣️ Tambaram → Guindy</div>
            <div class="meter">
                <div class="meter-fill" style="width: 45%; background: #ffaa00;"></div>
            </div>
            <div class="bus-card-bottom">
                <div class="suggestion">⚠️ Okay to board</div>
                <div class="eta">🕐 ETA 5 mins</div>
            </div>
        </div>
    </div>

    <div class="bottom-nav">
        <div class="nav-item active">
            <div class="nav-icon">🏠</div>
            Home
        </div>
        <div class="nav-item">
            <div class="nav-icon">🗺️</div>
            Map
        </div>
        <div class="nav-item">
            <div class="nav-icon">🔔</div>
            Alerts
        </div>
        <div class="nav-item">
            <div class="nav-icon">👤</div>
            Profile
        </div>
    </div>

    <script>
        function updateCount() {
            fetch('/count')
                .then(res => res.json())
                .then(data => {
                    const count = data.count;
                    const max = 50;
                    const percent = Math.min((count / max) * 100, 100);

                    const meter = document.getElementById('meter');
                    const badge = document.getElementById('badge');
                    const suggestion = document.getElementById('suggestion');

                    meter.style.width = percent + '%';

                    if (count ==0) {
                        meter.style.background = '#00ff88';
                        badge.className = 'crowd-badge empty';
                        badge.innerText = '🟢 Empty';
                        suggestion.innerText = '✅ Safe to board!';
                    } else if (count < 3) {
                        meter.style.background = '#ffaa00';
                        badge.className = 'crowd-badge moderate';
                        badge.innerText = '🟡 Moderate';
                        suggestion.innerText = '⚠️ Okay to board';
                    } else {
                        meter.style.background = '#ff4444';
                        badge.className = 'crowd-badge crowded';
                        badge.innerText = '🔴 Crowded';
                        suggestion.innerText = '❌ Wait for next bus';
                    }
                });
        }
        setInterval(updateCount, 1000);
    </script>
</body>
</html>
