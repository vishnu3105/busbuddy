<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BusBuddy</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --accent: #76b900;
            --accent-dim: rgba(118,185,0,0.12);
            --bg: #080808;
            --bg-card: #111111;
            --bg-input: #1a1a1a;
            --border: rgba(255,255,255,0.07);
            --text-primary: #ffffff;
            --text-secondary: rgba(255,255,255,0.45);
            --text-muted: rgba(255,255,255,0.2);
            --green: #30d158;
            --amber: #ffd60a;
            --red: #ff453a;
            --nav-height: 64px;
        }

        html, body {
            height: 100%;
            background: var(--bg);
            font-family: 'Inter', sans-serif;
            color: var(--text-primary);
            overflow: hidden;
        }

        .app {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* HEADER */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 20px 12px;
            background: var(--bg);
            border-bottom: 0.5px solid var(--border);
            z-index: 100;
            flex-shrink: 0;
        }

        .header-left { display: flex; flex-direction: column; gap: 2px; }

        .wordmark {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 18px;
            font-weight: 700;
            letter-spacing: -0.3px;
            color: var(--text-primary);
        }

        .wordmark span { color: var(--accent); }

        .greeting {
            font-size: 11px;
            color: var(--text-muted);
            letter-spacing: 0.02em;
        }

        .header-right { display: flex; align-items: center; gap: 12px; }

        .icon-btn {
            width: 36px; height: 36px;
            background: var(--bg-card);
            border: 0.5px solid var(--border);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 15px;
            transition: background 0.2s;
        }

        .icon-btn:hover { background: var(--bg-input); }

        /* SEARCH BAR */
        .search-wrap {
            padding: 12px 20px;
            background: var(--bg);
            flex-shrink: 0;
        }

        .search-bar {
            width: 100%;
            padding: 11px 16px 11px 38px;
            background: var(--bg-input);
            border: 0.5px solid var(--border);
            border-radius: 10px;
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            font-size: 13px;
            outline: none;
            transition: border-color 0.2s;
            position: relative;
        }

        .search-bar::placeholder { color: var(--text-muted); }
        .search-bar:focus { border-color: rgba(118,185,0,0.3); }

        .search-wrap-inner {
            position: relative;
        }

        .search-icon {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 14px;
            pointer-events: none;
        }

        /* MAP */
        .map-section {
            flex-shrink: 0;
            height: 42vh;
            position: relative;
        }

        #map {
            width: 100%;
            height: 100%;
        }

        /* Override leaflet for dark mode */
        .leaflet-container {
            background: #1a1a1a !important;
            font-family: 'Inter', sans-serif !important;
        }

        .leaflet-tile {
            filter: invert(1) hue-rotate(180deg) brightness(0.85) contrast(0.9) saturate(0.8);
        }

        /* Map overlay badge */
        .map-badge {
            position: absolute;
            top: 12px;
            left: 12px;
            z-index: 1000;
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 6px 10px;
            background: rgba(8,8,8,0.85);
            border: 0.5px solid var(--border);
            border-radius: 6px;
            backdrop-filter: blur(10px);
        }

        .map-dot {
            width: 5px; height: 5px;
            background: var(--accent);
            border-radius: 50%;
            animation: blink 1.8s ease-in-out infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        .map-badge-text {
            font-size: 11px;
            font-weight: 500;
            color: var(--accent);
            letter-spacing: 0.06em;
            text-transform: uppercase;
        }

        /* BOTTOM SHEET */
        .bottom-sheet {
            flex: 1;
            background: var(--bg);
            border-top: 0.5px solid var(--border);
            overflow-y: auto;
            padding: 16px 20px;
            padding-bottom: calc(var(--nav-height) + 16px);
        }

        .sheet-handle {
            width: 36px; height: 3px;
            background: rgba(255,255,255,0.1);
            border-radius: 2px;
            margin: 0 auto 16px;
        }

        .section-label {
            font-size: 11px;
            font-weight: 500;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom: 12px;
        }

        /* BUS CARD */
        .bus-card {
            background: var(--bg-card);
            border: 0.5px solid var(--border);
            border-radius: 14px;
            padding: 16px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: border-color 0.2s, background 0.2s;
        }

        .bus-card:hover {
            border-color: rgba(255,255,255,0.12);
            background: #161616;
        }

        .bus-card-top {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 10px;
        }

        .bus-info { display: flex; flex-direction: column; gap: 3px; }

        .bus-num {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 17px;
            font-weight: 700;
            color: var(--text-primary);
            letter-spacing: -0.3px;
        }

        .bus-route {
            font-size: 12px;
            color: var(--text-muted);
        }

        .crowd-pill {
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.04em;
            text-transform: uppercase;
        }

        .pill-green { background: rgba(48,209,88,0.12); color: #30d158; }
        .pill-amber { background: rgba(255,214,10,0.12); color: #ffd60a; }
        .pill-red { background: rgba(255,69,58,0.12); color: #ff453a; }

        .meter {
            width: 100%;
            height: 3px;
            background: rgba(255,255,255,0.06);
            border-radius: 2px;
            overflow: hidden;
            margin-bottom: 10px;
        }

        .meter-fill {
            height: 100%;
            border-radius: 2px;
            transition: width 0.5s ease, background 0.5s ease;
        }

        .bus-card-bottom {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .suggestion-text {
            font-size: 12px;
            color: var(--text-secondary);
        }

        .eta-text {
            font-size: 11px;
            color: var(--text-muted);
        }

        /* BOTTOM NAV */
        .bottom-nav {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            height: var(--nav-height);
            background: rgba(8,8,8,0.95);
            border-top: 0.5px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-around;
            padding: 0 8px;
            backdrop-filter: blur(20px);
            z-index: 200;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            padding: 8px 16px;
            border-radius: 10px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .nav-item:hover { background: rgba(255,255,255,0.04); }

        .nav-icon { font-size: 18px; }

        .nav-label {
            font-size: 10px;
            font-weight: 500;
            color: var(--text-muted);
            letter-spacing: 0.04em;
        }

        .nav-item.active .nav-label { color: var(--accent); }
        .nav-item.active .nav-icon { filter: none; }

        /* Custom bus marker */
        .bus-marker {
            width: 36px; height: 36px;
            background: var(--accent);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            border: 2px solid #080808;
            box-shadow: 0 0 12px rgba(118,185,0,0.4);
        }

        /* Leaflet popup dark */
        .leaflet-popup-content-wrapper {
            background: #111111 !important;
            border: 0.5px solid rgba(255,255,255,0.1) !important;
            border-radius: 12px !important;
            box-shadow: 0 8px 32px rgba(0,0,0,0.6) !important;
            color: white !important;
        }

        .leaflet-popup-tip { background: #111111 !important; }

        .popup-content { padding: 4px; }

        .popup-bus-num {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 16px;
            font-weight: 700;
            color: white;
            margin-bottom: 3px;
        }

        .popup-route {
            font-size: 11px;
            color: rgba(255,255,255,0.4);
            margin-bottom: 10px;
        }

        .popup-count {
            font-size: 28px;
            font-weight: 700;
            font-family: 'Space Grotesk', sans-serif;
            color: white;
            margin-bottom: 2px;
        }

        .popup-status {
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .popup-suggestion {
            font-size: 11px;
            color: rgba(255,255,255,0.45);
        }
    </style>
</head>
<body>

<div class="app">

    <!-- HEADER -->
    <div class="header">
        <div class="header-left">
            <div class="wordmark">Bus<span>Buddy</span></div>
            <div class="greeting">Good morning, Vishnu</div>
        </div>
        <div class="header-right">
            <div class="icon-btn">🔔</div>
            <div class="icon-btn">👤</div>
        </div>
    </div>

    <!-- SEARCH -->
    <div class="search-wrap">
        <div class="search-wrap-inner">
            <span class="search-icon">🔍</span>
            <input class="search-bar" type="text" placeholder="Search route or stop...">
        </div>
    </div>

    <!-- MAP -->
    <div class="map-section">
        <div id="map"></div>
        <div class="map-badge">
            <div class="map-dot"></div>
            <div class="map-badge-text">1 bus live</div>
        </div>
    </div>

    <!-- BOTTOM SHEET -->
    <div class="bottom-sheet">
        <div class="sheet-handle"></div>
        <div class="section-label">Nearby Buses</div>

        <!-- Bus 66 — LIVE -->
        <div class="bus-card">
            <div class="bus-card-top">
                <div class="bus-info">
                    <div class="bus-num">Bus 66</div>
                    <div class="bus-route">Tambaram → Koyambedu</div>
                </div>
                <div class="crowd-pill pill-green" id="badge">Loading...</div>
            </div>
            <div class="meter">
                <div class="meter-fill" id="meter"></div>
            </div>
            <div class="bus-card-bottom">
                <div class="suggestion-text" id="suggestion">Fetching data...</div>
                <div class="eta-text">ETA 3 min</div>
            </div>
        </div>

        <!-- Bus 21C — Static -->
        <div class="bus-card">
            <div class="bus-card-top">
                <div class="bus-info">
                    <div class="bus-num">Bus 21C</div>
                    <div class="bus-route">Tambaram → T.Nagar</div>
                </div>
                <div class="crowd-pill pill-red">Crowded</div>
            </div>
            <div class="meter">
                <div class="meter-fill" style="width:82%; background:#ff453a;"></div>
            </div>
            <div class="bus-card-bottom">
                <div class="suggestion-text">Wait for next bus</div>
                <div class="eta-text">ETA 7 min</div>
            </div>
        </div>

        <!-- Bus 45G — Static -->
        <div class="bus-card">
            <div class="bus-card-top">
                <div class="bus-info">
                    <div class="bus-num">Bus 45G</div>
                    <div class="bus-route">Tambaram → Guindy</div>
                </div>
                <div class="crowd-pill pill-amber">Moderate</div>
            </div>
            <div class="meter">
                <div class="meter-fill" style="width:45%; background:#ffd60a;"></div>
            </div>
            <div class="bus-card-bottom">
                <div class="suggestion-text">Okay to board</div>
                <div class="eta-text">ETA 5 min</div>
            </div>
        </div>

    </div>

</div>

<!-- BOTTOM NAV -->
<div class="bottom-nav">
    <div class="nav-item active">
        <div class="nav-icon">🏠</div>
        <div class="nav-label" style="color: var(--accent);">Home</div>
    </div>
    <div class="nav-item">
        <div class="nav-icon">🗺️</div>
        <div class="nav-label">Map</div>
    </div>
    <div class="nav-item">
        <div class="nav-icon">🔔</div>
        <div class="nav-label">Alerts</div>
    </div>
    <div class="nav-item">
        <div class="nav-icon">👤</div>
        <div class="nav-label">Profile</div>
    </div>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script>
    // Tambaram coordinates
    const TAMBARAM = [12.9249, 80.1000];

    // Init map
    const map = L.map('map', {
        center: TAMBARAM,
        zoom: 15,
        zoomControl: false,
        attributionControl: false
    });

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    // Custom bus marker
    const busIcon = L.divIcon({
        html: `<div style="
            width:36px;height:36px;
            background:#76b900;
            border-radius:50%;
            display:flex;align-items:center;justify-content:center;
            font-size:16px;
            border:2.5px solid #080808;
            box-shadow:0 0 14px rgba(118,185,0,0.5);
        ">🚌</div>`,
        className: '',
        iconSize: [36, 36],
        iconAnchor: [18, 18]
    });

    // Bus 66 marker
    const busMarker = L.marker(TAMBARAM, { icon: busIcon }).addTo(map);

    // Popup
    const popup = L.popup({
        closeButton: false,
        className: 'dark-popup',
        offset: [0, -18]
    });

    busMarker.on('click', () => {
        const count = parseInt(document.getElementById('badge').innerText) || 0;
        const statusText = document.getElementById('suggestion').innerText;
        const badgeText = document.getElementById('badge').innerText;

        popup.setLatLng(TAMBARAM)
            .setContent(`
                <div class="popup-content">
                    <div class="popup-bus-num">Bus 66</div>
                    <div class="popup-route">Tambaram → Koyambedu</div>
                    <div class="popup-count" id="popup-count">${currentCount}</div>
                    <div class="popup-status" id="popup-status" style="color:${currentColor}">${badgeText}</div>
                    <div class="popup-suggestion">${statusText}</div>
                </div>
            `)
            .openOn(map);
    });

    // Simulated bus movement
    let lat = TAMBARAM[0];
    let lng = TAMBARAM[1];

    function moveBus() {
        lat += 0.00005;
        lng += 0.00003;
        busMarker.setLatLng([lat, lng]);
    }

    setInterval(moveBus, 3000);

    // Live crowd count
    let currentCount = 0;
    let currentColor = '#30d158';

    function updateCount() {
        fetch('/count')
            .then(res => res.json())
            .then(data => {
                currentCount = data.count;
                const max = 50;
                const percent = Math.min((currentCount / max) * 100, 100);

                const meter = document.getElementById('meter');
                const badge = document.getElementById('badge');
                const suggestion = document.getElementById('suggestion');

                meter.style.width = percent + '%';

                if (currentCount === 0) {
                    currentColor = '#30d158';
                    meter.style.background = '#30d158';
                    badge.className = 'crowd-pill pill-green';
                    badge.innerText = 'Empty';
                    suggestion.innerText = 'Safe to board';
                    busMarker._icon.querySelector('div').style.background = '#76b900';
                } else if (currentCount < 3) {
                    currentColor = '#ffd60a';
                    meter.style.background = '#ffd60a';
                    badge.className = 'crowd-pill pill-amber';
                    badge.innerText = 'Moderate';
                    suggestion.innerText = 'Okay to board';
                    busMarker._icon.querySelector('div').style.background = '#ffd60a';
                } else {
                    currentColor = '#ff453a';
                    meter.style.background = '#ff453a';
                    badge.className = 'crowd-pill pill-red';
                    badge.innerText = 'Crowded';
                    suggestion.innerText = 'Wait for next bus';
                    busMarker._icon.querySelector('div').style.background = '#ff453a';
                }
            });
    }

    setInterval(updateCount, 1000);
</script>

</body>
</html>
