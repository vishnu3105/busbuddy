<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BusBuddy - Login</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #0a0a12;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', sans-serif;
        }

        .container {
            position: relative;
            width: 380px;
            padding: 40px;
            background: #0f0f1a;
            border-radius: 20px;
            z-index: 0;
        }

        /* BORDER GLOW EFFECT */
        .container::before {
            content: '';
            position: absolute;
            inset: -2px;
            border-radius: 22px;
            background: linear-gradient(135deg, #00ff88, #0066ff, #00ff88);
            background-size: 300% 300%;
            animation: glowRotate 3s linear infinite;
            z-index: -1;
        }

        .container::after {
            content: '';
            position: absolute;
            inset: -6px;
            border-radius: 26px;
            background: linear-gradient(135deg, #00ff88, #0066ff, #00ff88);
            background-size: 300% 300%;
            animation: glowRotate 3s linear infinite;
            z-index: -2;
            filter: blur(10px);
            opacity: 0.5;
        }

        @keyframes glowRotate {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .logo {
            text-align: center;
            font-size: 36px;
            margin-bottom: 8px;
        }

        .app-name {
            text-align: center;
            font-size: 28px;
            font-weight: bold;
            color: #00ff88;
            margin-bottom: 6px;
        }

        .tagline {
            text-align: center;
            font-size: 13px;
            color: #555;
            margin-bottom: 35px;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            font-size: 13px;
            color: #888;
            margin-bottom: 8px;
        }

        .input-group input {
            width: 100%;
            padding: 14px 16px;
            background: #1a1a2e;
            border: 1px solid #222;
            border-radius: 12px;
            color: white;
            font-size: 15px;
            outline: none;
            transition: border 0.3s;
        }

        .input-group input:focus {
            border-color: #00ff88;
        }

        .btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #00ff88, #0066ff);
            border: none;
            border-radius: 12px;
            color: #0a0a12;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            transition: opacity 0.3s;
        }

        .btn:hover {
            opacity: 0.85;
        }

        .footer-text {
            text-align: center;
            font-size: 12px;
            color: #444;
            margin-top: 25px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">🚌</div>
        <div class="app-name">BusBuddy</div>
        <div class="tagline">Smart travel. Know before you board.</div>

        <div class="input-group">
            <label>Phone Number</label>
            <input type="text" placeholder="+91 98765 43210">
        </div>

        <div class="input-group">
            <label>Password</label>
            <input type="password" placeholder="Enter your password">
        </div>

        <button class="btn" onclick="window.location.href='/home'">Login →</button>

        <div class="footer-text">BusBuddy © 2026 • Tamil Nadu</div>
    </div>
</body>
</html>
